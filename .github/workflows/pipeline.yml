
name: HNG Stage 2 DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Code Quality and Security
    runs-on: ubuntu-latest
    
    # Required for Redis-dependent tests
    services:
      redis:
        image: redis:alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: pipeline_has_dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov flake8

      - name: pipeline_has_flake8
        run: flake8 api/

      - name: pipeline_has_pytest
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          pytest --cov=api api/tests/ --cov-report=xml

      - name: pipeline_coverage_artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: pipeline_has_hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: pipeline_has_trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hng-api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'

      - name: pipeline_sarif_artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-scan
          path: trivy-results.sarif

  deploy:
    name: Continuous Deployment
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: pipeline_compose_up_in_ci
        run: docker compose up -d --build

      - name: pipeline_teardown_always
        if: always()
        run: docker compose down;